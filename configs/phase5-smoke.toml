[experiment]
name = "phase5-controlled-representation-analysis-smoke"
seed = 42

[runtime]
device = "auto"

[paths]
data_dir = "data"
output_dir = "outputs/phase5-smoke"

[model]
id = "facebook/dinov3-vits16-pretrain-lvd1689m"
revision = "1c5ca6c02d42f58a290bf983d66b85d0cd2b3bcd"

[features]
layer = "final"
pooling = "cls"
resolution = 224

[dataset]
split = "val"
subset_size = 20

[analysis]
depths = ["1", "6", "final"]
resolutions = [224, 448]
batch_sizes = { "224" = 5, "448" = 2 }
probe_epochs = 100
probe_batch_size = 64
probe_learning_rate = 0.001
probe_weight_decay = 0.0001
robustness_layer = "final"
retrieval_queries = 4
retrieval_k = 3
